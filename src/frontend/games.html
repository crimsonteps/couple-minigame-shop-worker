<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh Kanh Mini Game - 游戏</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("couple-home.theme");
          const theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="games">
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-box">
          <h1>游戏厅</h1>
        </div>
        <nav class="nav-strip">
          <a data-page-link href="/games.html">游戏</a>
          <a data-page-link href="/shop.html">商城</a>
          <a data-page-link href="/profile.html">我的</a>
        </nav>
        <div class="identity-panel">
          <span class="pill soft identity-avatar" data-current-user-display></span>
        </div>
      </header>

      <main class="layout-stack">
        <section class="card hero-card">
          <div class="hero-copy">
            <h2>所有游戏都在这里</h2>
          </div>
          <div class="hero-status">
            <span id="socket-pill" class="pill connecting">正在连接</span>
            <span id="games-server-time" class="meta-text">--</span>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">连线状态</p>
              <h3>双方</h3>
            </div>
          </div>
          <div id="games-score-grid" class="score-grid"></div>
        </section>

        <section class="card game-card">
          <div class="section-head">
            <div>
              <p class="eyebrow">小游戏</p>
              <h3>选游戏</h3>
            </div>
            <div class="game-actions">
              <button id="start-game-btn" class="primary-button" type="button">开始游戏</button>
              <button id="force-end-game-btn" class="danger-button" type="button">强制结束当局</button>
            </div>
          </div>
          <div id="game-selector" class="game-selector"></div>
          <div class="round-summary-box">
            <p id="round-title" class="round-title">等待开始</p>
            <p id="round-summary" class="round-summary">先选一个游戏。</p>
          </div>
          <div id="game-panel" class="game-panel"></div>
          <p id="choice-hint" class="hint-text">结果和积分会自动结算。</p>
        </section>

      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
