<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh Kanh Mini Game - 商城</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("couple-home.theme");
          const theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="shop">
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-box">
          <h1>礼物兑换站</h1>
        </div>
        <nav class="nav-strip">
          <a data-page-link href="/games.html">游戏</a>
          <a data-page-link href="/shop.html">商城</a>
          <a data-page-link href="/profile.html">我的</a>
        </nav>
        <div class="identity-panel">
          <span class="pill soft identity-avatar" data-current-user-display></span>
        </div>
      </header>

      <main class="layout-stack">
        <section class="card hero-card">
          <div class="hero-copy">
            <h2>挑个礼物</h2>
            <p>积分足够就可兑换，库存与兑换记录会同步更新，避免超额兑换。</p>
          </div>
          <div class="hero-status">
            <span id="shop-balance-pill" class="pill soft">积分 --</span>
            <span id="shop-server-time" class="meta-text">--</span>
          </div>
        </section>

        <section class="card">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">商品清单</p>
              <h3>礼物</h3>
            </div>
          </div>
          <div id="shop-grid" class="shop-grid"></div>
        </section>

      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
