<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh Kanh Mini Game - 我的</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("couple-home.theme");
          const theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="profile">
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-box">
          <h1>我的礼物库</h1>
        </div>
        <nav class="nav-strip">
          <a data-page-link href="/games.html">游戏</a>
          <a data-page-link href="/shop.html">商城</a>
          <a data-page-link href="/profile.html">我的</a>
        </nav>
        <div class="identity-panel">
          <span class="pill soft identity-avatar" data-current-user-display></span>
        </div>
      </header>

      <main class="layout-stack">
        <section class="card hero-card profile-hero">
          <div class="hero-copy">
            <h2>积分和礼物卡片</h2>
            <p>在一个页面看清当前积分、收藏礼物和最近互动轨迹。</p>
          </div>
          <div class="hero-status">
            <span id="profile-score-pill" class="pill soft">积分 --</span>
            <span id="profile-server-time" class="meta-text">--</span>
          </div>
        </section>

        <section class="card profile-summary-card">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">个人信息</p>
              <h3>我的积分</h3>
            </div>
          </div>
          <div id="profile-summary" class="profile-summary"></div>
        </section>

        <section class="card">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">礼物卡片</p>
              <h3>我的收藏</h3>
            </div>
          </div>
          <div id="gift-card-grid" class="gift-card-grid"></div>
        </section>

        <section id="records" class="dual-grid profile-records-grid">
          <div class="card">
            <div class="section-head compact">
              <div>
                <p class="eyebrow">游戏记录</p>
                <h3>对局记录</h3>
              </div>
            </div>
            <ul id="profile-games-list" class="timeline-list"></ul>
          </div>
          <div class="card">
            <div class="section-head compact">
              <div>
                <p class="eyebrow">兑换记录</p>
                <h3>礼物流水</h3>
              </div>
            </div>
            <ul id="profile-redemptions-list" class="timeline-list"></ul>
          </div>
        </section>

        <section id="profile-admin-card" class="card" hidden>
          <div class="section-head compact">
            <div>
              <p class="eyebrow">后台</p>
              <h3>管理员入口</h3>
            </div>
            <a class="primary-button link-button" data-profile-admin-link href="/admin.html">进入后台</a>
          </div>
          <p class="round-summary">在这里改积分、改礼物和管理商品。</p>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
